<!doctype html>
<html>
  <head>

    <meta

      content="default-src 'self'; style-src 'unsafe-inline'"
    />
    <title>PortalGems — Phase 0</title>

      body { font-family: system-ui, sans-serif; margin: 24px; }

      }
